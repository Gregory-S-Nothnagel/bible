<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bible Viewer with Side Search</title>
    <style>
        body {
            font-family: Times, Times New Roman, serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Bible text container on the left */
        #bible-container {
            flex: 2;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            border-right: 2px solid #ccc;
        }

        .verse {
            white-space: pre-wrap;
            margin: 0;
        }

        /* Search container on the right */
        #search-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            background: white;
        }

        #search-results {
            margin-top: 10px;
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        .search-result {
            cursor: pointer;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }

        .search-result:hover {
            background-color: #f0f0f0;
        }

        .highlight {
            background-color: yellow;
        }

        .active-verse {
            background-color: #e0e0e0;
        }

        .active-search-result {
            background-color: #e0e0e0;
        }

        #search-button {
            margin-left: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }

        #search-box {
            width: calc(100% - 80px);
            padding: 5px;
        }

        .search-input-container {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="bible-container"></div>

    <!-- Search Tool on the Right -->
    <div id="search-container">
        <div class="search-input-container">
            <input type="text" id="search-box" placeholder="Search for a word..." />
            <button id="search-button">Search</button>
        </div>
        <div id="search-results"></div>
    </div>

    <script>
        // Bible text array (example lines)
        const bibleText = [
            "- The First Book of Moses: Called Genesis",
            "- ",
            "- In the beginning God created the heaven and the earth.",
            "- And the earth was without form, and void; and darkness was upon the face of the deep. And the Spirit of God moved upon the face of the waters.",
            "- And God said, Let there be light: and there was light.",
            "- And God saw the light, that it was good: and God divided the light from the darkness.",
            "- And God called the light Day, and the darkness he called Night. And the evening and the morning were the first day.",
            "- And God said, Let there be a firmament in the midst of the waters, and let it divide the waters from the waters.",
            "- And God made the firmament, and divided the waters which were under the firmament from the waters which were above the firmament: and it was so.",
            "- And God called the firmament Heaven. And the evening and the morning were the second day.",
            "- And God said, Let the waters under the heaven be gathered together unto one place, and let the dry land appear: and it was so.",
            "- And God called the dry land Earth; and the gathering together of the waters called he Seas: and God saw that it was good.",
            "- And God said, Let the earth bring forth grass, the herb yielding seed, and the fruit tree yielding fruit after his kind, whose seed is in itself, upon the earth: and it was so.",
            "- And the earth brought forth grass, and herb yielding seed after his kind, and the tree yielding fruit, whose seed was in itself, after his kind: and God saw that it was good.",
            "- And the evening and the morning were the third day.",
            "- And God said, Let there be lights in the firmament of the heaven to divide the day from the night; and let them be for signs, and for seasons, and for days, and years: And let them be for lights in the firmament of the heaven to give light upon the earth: and it was so.",
            "- And God made two great lights; the greater light to rule the day, and the lesser light to rule the night: he made the stars also.",
            "- And God set them in the firmament of the heaven to give light upon the earth, And to rule over the day and over the night, and to divide the light from the darkness: and God saw that it was good.",
            "- And the evening and the morning were the fourth day.",
            "- And God said, Let the waters bring forth abundantly the moving creature that hath life, and fowl that may fly above the earth in the open firmament of heaven.",
            "- And God created great whales, and every living creature that moveth, which the waters brought forth abundantly, after their kind, and every winged fowl after his kind: and God saw that it was good.",
            "- And God blessed them, saying, Be fruitful, and multiply, and fill the waters in the seas, and let fowl multiply in the earth.",
            "- And the evening and the morning were the fifth day.",
            "- And God said, Let the earth bring forth the living creature after his kind, cattle, and creeping thing, and beast of the earth after his kind: and it was so.",
            "- And God made the beast of the earth after his kind, and cattle after their kind, and every thing that creepeth upon the earth after his kind: and God saw that it was good.",
            "- And God said, Let us make man in our image, after our likeness: and let them have dominion over the fish of the sea, and over the fowl of the air, and over the cattle, and over all the earth, and over every creeping thing that creepeth upon the earth.",
            "- So God created man in his own image, in the image of God created he him; male and female created he them.",
            "- And God blessed them, and God said unto them, Be fruitful, and multiply, and replenish the earth, and subdue it: and have dominion over the fish of the sea, and over the fowl of the air, and over every living thing that moveth upon the earth.",
            "- And God said, Behold, I have given you every herb bearing seed, which is upon the face of all the earth, and every tree, in the which is the fruit of a tree yielding seed; to you it shall be for meat.",
            "- And to every beast of the earth, and to every fowl of the air, and to every thing that creepeth upon the earth, wherein there is life, I have given every green herb for meat: and it was so."
        ];

        const container = document.getElementById('bible-container');
        const searchBox = document.getElementById('search-box');
        const searchButton = document.getElementById('search-button');
        const searchResults = document.getElementById('search-results');

        let activeSearchResult = null;

        // Render the entire Bible text with unique IDs for each line
        bibleText.forEach((line, index) => {
            const p = document.createElement('p');
            p.className = 'verse';
            p.textContent = line;
            p.id = `verse-${index}`; // Unique ID for scrolling
            container.appendChild(p);
        });

        // Search functionality with Bible text highlighting
        function performSearch() {
            const query = searchBox.value.trim().toLowerCase();
            searchResults.innerHTML = ''; // Clear previous results

            // Clear previous highlights in the Bible text
            document.querySelectorAll('.verse').forEach(p => {
                const index = parseInt(p.id.split('-')[1]);
                p.innerHTML = bibleText[index]; // Reset to original text
                p.classList.remove('active-verse');
            });

            if (query === '') return;

            bibleText.forEach((line, index) => {
                if (line.toLowerCase().includes(query)) {
                    // Highlight in search results
                    const result = document.createElement('div');
                    result.className = 'search-result';
                    result.innerHTML = highlightMatch(line, query);

                    // Click behavior for search results
                    result.addEventListener('click', () => {
                        // Remove previous active highlights
                        document.querySelectorAll('.verse').forEach(p => p.classList.remove('active-verse'));
                        document.querySelectorAll('.search-result').forEach(r => r.classList.remove('active-search-result'));

                        // Highlight the clicked search result
                        result.classList.add('active-search-result');

                        const verseElement = document.getElementById(`verse-${index}`);
                        verseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        verseElement.classList.add('active-verse');
                    });

                    searchResults.appendChild(result);

                    // Highlight in Bible text
                    const verseElement = document.getElementById(`verse-${index}`);
                    verseElement.innerHTML = highlightMatch(line, query);
                }
            });
        }

        // Trigger search on button click
        searchButton.addEventListener('click', performSearch);

        // Trigger search on "Enter" key press
        searchBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Function to highlight matched word in results
        function highlightMatch(text, query) {
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }
    </script>

</body>
</html>
